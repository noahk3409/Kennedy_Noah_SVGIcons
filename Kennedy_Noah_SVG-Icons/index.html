<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>SVG Icons</title>
        <link href="css/main.css" rel="stylesheet">        
    </head>
    <body>
        <h1>SVG Icons</h1>
        <!-- link just above the closing body tag
        this allows for the entire DOM tree to be built -->
       <script src="js/main.js"></script> 
       
       <div class="container">
        <img src="images/Monitor.svg" width="500" height="500">
         <div class="overlay">
           <div class="text">Monitor</div>
         </div>
       </div>
       
       <div class="container">
        <img src="images/Keyboard.svg" width="500" height="500">
         <div class="overlay">
           <div class="text">Keyboard</div>
         </div>
       </div>

       <div class="container">
        <img src="images/Mouse.svg" width="500" height="500">
         <div class="overlay">
           <div class="text">Mouse</div>
         </div>
       </div>

       <div class="container">
        <img src="images/Headphones.svg" width="500" height="500">
         <div class="overlay">
           <div class="text">Headphones</div>
         </div>
       </div>

       <div class="container">
        <img src="images/Phone.svg" width="500" height="500">
         <div class="overlay">
           <div class="text">Phone</div>
         </div>
       </div>

       <div class="container">
        <img src="images/Charger.svg" width="500" height="500">
         <div class="overlay">
           <div class="text">Charger</div>
         </div>
       </div>
    
    </body>
</html>
